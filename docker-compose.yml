# Local dev stack: Redis + MinIO (S3-compatible) + the backend.
# The homelab/EC2 backends run this same image; only creds & scale differ.
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]

  # Creates the bucket once minio is up.
  minio-init:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/wormhole-blobs;
      mc ilm rule add local/wormhole-blobs --expire-days 1 || true;
      "

  backend:
    build: ./backend
    depends_on: [redis, minio, minio-init]
    ports: ["8080:8080"]
    environment:
      WH_BIND: 0.0.0.0:8080
      WH_S3_BUCKET: wormhole-blobs
      WH_REDIS_URL: redis://redis:6379/
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ENDPOINT_URL_S3: http://minio:9000
